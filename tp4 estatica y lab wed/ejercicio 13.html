<html>
<head>
    <title>Inmobiliaria</title>
</head>
<body>
<h2>Formulario de Búsqueda de Inmuebles</h2>
<form action="#" method="post">
    Nombre:
    <input type="text" name="nombre" maxlength="25">
    <br><br>
    Apellido:
    <input type="text" name="apellido" maxlength="25">
    <br><br>
    Dirección:
    <br>
    <textarea name="direccion" maxlength="30" rows="3" cols="30"></textarea>
    <br><br>
    Teléfono:
    <input type="text" name="telefono" value="0299" maxlength="15">
    <br><br>
    Operación:
    <br>
    <input type="radio" name="operacion" value="alquiler">
    Alquiler
    <br>
    <input type="radio" name="operacion" value="compra" checked>
    Compra
    <br><br>
    Zona de interés:
    <br>
    <input type="checkbox" name="zona" value="centro" checked>
    Zona Centro
    <br>
    <input type="checkbox" name="zona" value="norte">
    Zona Norte
    <br>
    <input type="checkbox" name="zona" value="sur" checked>
    Zona Sur
    <br><br>
    Comentario del inmueble que busca:
    <br>
    <textarea name="comentario" rows="5" cols="40"></textarea>
    <br><br>
    <input type="reset" value="Restablecer">
    <input type="submit" value="Enviar">
</form>
</body>
</html>
